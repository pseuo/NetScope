<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .Title }}{{ .Title }}{{ else }}IP 工具{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}在线 IP、CIDR、子网掩码、IPv4、IPv6 和网络地址计算工具。{{ end }}" />
  <link rel="canonical" href="https://www.ip.network/tools" id="canonicalLink" />
  <style>
    :root {
      --bg: #eef5ff;
      --card: rgba(255, 255, 255, 0.88);
      --text: #102033;
      --muted: #64748b;
      --line: rgba(51, 65, 85, 0.14);
      --brand: #1768ff;
      --brand-2: #00a6ff;
      --soft: rgba(23, 104, 255, 0.09);
      --bad: #b91c1c;
      --good: #047857;
      --shadow: 0 22px 55px rgba(15, 45, 95, 0.12);
      --font: "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(900px 420px at -10% -10%, rgba(23, 104, 255, 0.20), transparent 62%),
        radial-gradient(820px 440px at 105% -15%, rgba(0, 166, 255, 0.18), transparent 60%),
        linear-gradient(160deg, var(--bg), #fbfdff);
    }

    .wrap { width: min(1120px, calc(100% - 24px)); margin: 18px auto 32px; }

    .topbar, .hero, .panel, .card {
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 999px;
      position: sticky;
      top: 14px;
      z-index: 10;
    }

    .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
    .logo { width: 30px; height: 30px; border-radius: 10px; background: linear-gradient(145deg, var(--brand), var(--brand-2)); box-shadow: 0 10px 22px rgba(23, 104, 255, 0.28); }
    .brand strong { display: block; font-size: 15px; }
    .brand span { display: block; margin-top: 2px; color: var(--muted); font-size: 12px; }

    .topbar-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }

    .nav { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .nav a, button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      font-size: 13px;
      font-weight: 650;
      text-decoration: none;
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }
    .nav a:hover, button:hover { transform: translateY(-1px); border-color: rgba(23, 104, 255, 0.35); }
    button.primary { color: #fff; border-color: transparent; background: linear-gradient(145deg, var(--brand), #0f56da); box-shadow: 0 12px 24px rgba(23, 104, 255, 0.25); }
    .menu-toggle { display: none; }

    .hero {
      margin-top: 14px;
      border-radius: 26px;
      padding: 28px;
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
      gap: 18px;
      align-items: center;
    }
    .eyebrow { color: var(--brand); font-size: 13px; font-weight: 750; letter-spacing: 0.08em; text-transform: uppercase; }
    h1 { margin: 9px 0 10px; font-size: clamp(28px, 4vw, 42px); line-height: 1.1; letter-spacing: -0.5px; }
    .hero p, .desc { margin: 0; color: var(--muted); line-height: 1.75; }
    .hero-card { border: 1px solid rgba(23, 104, 255, 0.14); background: var(--soft); border-radius: 20px; padding: 18px; }
    .hero-card strong { display: block; margin-bottom: 8px; }
    .hero-card p { font-size: 13px; }

    .layout { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 14px; margin-top: 14px; }
    .panel, .card { border-radius: 24px; padding: 20px; }
    h2 { margin: 0 0 8px; font-size: 22px; }
    h3 { margin: 0 0 10px; font-size: 16px; }

    .field { margin-top: 14px; }
    label { display: block; margin-bottom: 7px; color: #334155; font-size: 13px; font-weight: 700; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 13px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      outline: none;
    }
    textarea { min-height: 156px; resize: vertical; font-family: "SFMono-Regular", Consolas, monospace; line-height: 1.55; }
    input:focus, textarea:focus, select:focus { border-color: rgba(23, 104, 255, 0.55); box-shadow: 0 0 0 4px rgba(23, 104, 255, 0.10); }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    .result { margin-top: 16px; display: grid; gap: 10px; }
    .item { border: 1px solid var(--line); background: rgba(255, 255, 255, 0.72); border-radius: 18px; padding: 13px; }
    .item span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .item code, pre { white-space: pre-wrap; overflow-wrap: anywhere; font-family: "SFMono-Regular", Consolas, monospace; font-size: 13px; }
    .result-table { border: 1px solid var(--line); border-radius: 18px; overflow: hidden; background: rgba(255, 255, 255, 0.72); }
    .result-row { display: grid; grid-template-columns: minmax(150px, 0.36fr) minmax(0, 1fr) auto; gap: 10px; align-items: center; padding: 12px 13px; border-top: 1px solid var(--line); }
    .result-row:first-child { border-top: 0; }
    .result-key { color: var(--muted); font-size: 12px; font-weight: 700; }
    .result-value { overflow-wrap: anywhere; font-family: "SFMono-Regular", Consolas, monospace; font-size: 13px; }
    .copy-btn { padding: 7px 10px; font-size: 12px; }
    .error { color: var(--bad); font-weight: 700; }
    .ok { color: var(--good); font-weight: 700; }

    .tool-list { display: grid; gap: 8px; }
    .tool-search { margin: 0 0 12px; }
    .tool-group { margin-top: 14px; }
    .tool-group-title { color: var(--muted); font-size: 12px; font-weight: 800; margin: 0 0 8px; }
    .tool-list a { display: block; padding: 11px 12px; border: 1px solid var(--line); border-radius: 15px; background: rgba(255,255,255,0.72); color: var(--text); text-decoration: none; font-size: 13px; font-weight: 700; }
    .tool-list a.active { border-color: rgba(23, 104, 255, 0.35); background: var(--soft); color: #0f56da; }
    .note { margin-top: 14px; color: var(--muted); font-size: 13px; line-height: 1.7; }
    .home-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 16px; }
    .home-card { border: 1px solid var(--line); border-radius: 18px; background: rgba(255,255,255,0.72); padding: 15px; text-decoration: none; color: inherit; transition: transform 160ms ease, border-color 160ms ease; }
    .home-card:hover { transform: translateY(-1px); border-color: rgba(23, 104, 255, 0.35); }
    .home-card strong { display: block; margin-bottom: 6px; }
    .home-card span { color: var(--muted); font-size: 13px; line-height: 1.6; }

    @media (max-width: 860px) {
      .wrap { width: min(1120px, calc(100% - 18px)); margin-top: 10px; }
      .topbar { align-items: stretch; border-radius: 22px; flex-direction: column; top: 8px; }
      .topbar-head { width: 100%; }
      .brand { min-width: 0; }
      .brand > span:last-child { min-width: 0; }
      .brand strong, .brand span span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .menu-toggle { display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto; }
      .nav { display: none; width: 100%; grid-template-columns: repeat(2, minmax(0, 1fr)); justify-content: stretch; }
      .nav.is-open { display: grid; }
      .nav a { display: inline-flex; align-items: center; justify-content: center; width: 100%; text-align: center; }
      .hero, .layout { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
      .home-grid { grid-template-columns: 1fr; }
      .result-row { grid-template-columns: 1fr; }
      .copy-btn { width: fit-content; }
    }

    @media (max-width: 420px) {
      .nav { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="topbar-head">
        <a class="brand" href="/">
          <span class="logo" aria-hidden="true"></span>
          <span><strong>IP 网络工具</strong><span>在线 IP、CIDR 与掩码计算</span></span>
        </a>
        <button id="menuToggleBtn" class="menu-toggle" type="button" aria-expanded="false" aria-controls="topNav">菜单</button>
      </div>
      <nav class="nav" id="topNav">
        <a href="/">NetScope</a>
        <a href="/ip-look">IP 查询</a>
        <a href="/nat-test">NAT 检测</a>
        <a href="/bandwidth-calculator">带宽计算器</a>
        <a href="/screen-test">屏幕检测</a>
        <button id="langBtn" type="button">EN</button>
      </nav>
    </header>

    <section class="hero">
      <div>
        <div class="eyebrow" id="toolKicker">Network Tool</div>
        <h1 id="toolTitle">IP 工具</h1>
        <p id="toolDesc">在浏览器本地完成计算，不上传输入内容。</p>
      </div>
      <div class="hero-card">
        <strong>本地计算</strong>
        <p>IPv4、IPv6、CIDR、NAT64 和通配符掩码转换都在当前页面完成，适合网络规划、ACL 配置和故障排查。</p>
      </div>
    </section>

    <main class="layout">
      <section class="panel">
        <h2 id="formTitle">输入</h2>
        <p class="desc" id="formDesc">填写参数后点击计算。</p>
        <div id="formFields"></div>
        <div class="actions">
          <button class="primary" type="button" id="calcBtn">计算</button>
          <button type="button" id="sampleBtn">填入示例</button>
          <button type="button" id="clearBtn">清空</button>
        </div>
        <div class="result" id="result"></div>
      </section>

      <aside class="card">
        <h3>其他 IP 工具</h3>
        <input class="tool-search" id="toolSearch" type="search" placeholder="搜索工具：CIDR、IPv6、掩码" />
        <div class="tool-list" id="toolList"></div>
        <p class="note" id="toolNote">提示：CIDR 聚合会先规范化网络段，再尽可能合并连续地址块。</p>
      </aside>
    </main>
  </div>

  <script src="/assets/js/mobile-nav.js"></script>
  <script src="/assets/js/ip-tools-i18n.js"></script>
  <script>
    const pages = {
      "ipv4-representations": {
        group: "IPv4 工具",
        title: "IPv4 地址表示转换器",
        kicker: "IPv4 Representations",
        desc: "把 IPv4 地址转换为十进制整数、十六进制、二进制、八进制和反向 DNS 表示。",
        form: "输入一个 IPv4 地址，查看常见表示方法。",
        note: "十进制整数常用于数据库存储；in-addr.arpa 常用于 PTR 反向解析。",
        sample: { ip: "192.168.1.10" },
        fields: [{ id: "ip", label: "IPv4 地址", type: "input", placeholder: "例如 192.168.1.10" }],
        run: values => {
          const n = ipv4ToInt(values.ip);
          const parts = intToIPv4Parts(n);
          return rows([
            ["标准点分十进制", intToIPv4(n)],
            ["十进制整数", String(n)],
            ["十六进制", "0x" + n.toString(16).padStart(8, "0").toUpperCase()],
            ["二进制", parts.map(x => x.toString(2).padStart(8, "0")).join(".")],
            ["八进制", parts.map(x => "0" + x.toString(8).padStart(3, "0")).join(".")],
            ["反向 DNS", parts.slice().reverse().join(".") + ".in-addr.arpa"]
          ]);
        }
      },
      "ipv6-nat64": {
        group: "IPv6 工具",
        title: "IPv6 NAT64 地址转换器",
        kicker: "IPv6 NAT64",
        desc: "根据 NAT64 前缀和 IPv4 地址生成 IPv6 NAT64 地址，也可从标准 /96 NAT64 地址中提取 IPv4。",
        form: "输入 IPv4 与 NAT64 前缀，或输入已有 NAT64 IPv6 地址。",
        note: "默认前缀 64:ff9b::/96 是 RFC 6052 定义的 Well-Known Prefix。",
        sample: { ipv4: "203.0.113.8", prefix: "64:ff9b::/96", nat64: "64:ff9b::cb00:7108" },
        fields: [
          { id: "ipv4", label: "IPv4 地址", type: "input", placeholder: "例如 203.0.113.8" },
          { id: "prefix", label: "NAT64 前缀", type: "input", placeholder: "例如 64:ff9b::/96" },
          { id: "nat64", label: "NAT64 IPv6 地址（可选，用于反解）", type: "input", placeholder: "例如 64:ff9b::cb00:7108" }
        ],
        run: values => {
          const out = [];
          if (values.ipv4.trim()) out.push(["生成的 NAT64 IPv6", makeNat64(values.prefix || "64:ff9b::/96", values.ipv4)]);
          if (values.nat64.trim()) out.push(["从 IPv6 提取 IPv4", extractNat64IPv4(values.nat64)]);
          if (!out.length) throw new Error("请至少输入 IPv4 地址或 NAT64 IPv6 地址");
          return rows(out);
        }
      },
      "ipv4-range-to-cidr": {
        group: "CIDR / 子网工具",
        title: "IPv4 范围转 CIDR",
        kicker: "IPv4 Range to CIDR",
        desc: "把起止 IPv4 地址范围拆分为最少数量的 CIDR 网段。",
        form: "输入起始和结束 IPv4 地址。",
        note: "生成结果适合路由表、访问控制列表和防火墙规则。",
        sample: { start: "192.168.1.10", end: "192.168.1.250" },
        fields: [
          { id: "start", label: "起始 IPv4", type: "input", placeholder: "例如 192.168.1.10" },
          { id: "end", label: "结束 IPv4", type: "input", placeholder: "例如 192.168.1.250" }
        ],
        run: values => pre(ipv4RangeToCIDR(ipv4ToInt(values.start), ipv4ToInt(values.end)).join("\n"))
      },
      "cidr-aggregator": {
        group: "CIDR / 子网工具",
        title: "CIDR 聚合器",
        kicker: "CIDR Aggregator",
        desc: "合并重叠或连续的 IPv4 CIDR，输出更短的等价网段列表。",
        form: "每行输入一个 IPv4 CIDR。",
        note: "当前聚合器支持 IPv4 CIDR；IPv6 范围转换请使用 IPv6 Range to CIDR。",
        sample: { cidrs: "192.168.0.0/25\n192.168.0.128/25\n192.168.1.0/24\n10.0.0.0/24" },
        fields: [{ id: "cidrs", label: "CIDR 列表", type: "textarea", placeholder: "192.168.0.0/25\n192.168.0.128/25" }],
        run: values => pre(aggregateCIDRs(values.cidrs).join("\n"))
      },
      "ipv4-cidr-to-netmask": {
        group: "IPv4 工具",
        title: "IPv4 CIDR 与子网掩码转换",
        kicker: "IPv4 CIDR to Netmask",
        desc: "把 IPv4 CIDR 前缀长度转换为子网掩码、通配符掩码、主机数和地址范围。",
        form: "输入 CIDR，例如 192.168.1.0/24 或 /27。",
        note: "/31 常用于点到点链路，/32 表示单个主机地址。",
        sample: { cidr: "192.168.1.0/24" },
        fields: [{ id: "cidr", label: "IPv4 CIDR 或前缀", type: "input", placeholder: "例如 192.168.1.0/24 或 /24" }],
        run: values => {
          const parsed = parseIPv4CIDR(values.cidr);
          const mask = prefixMask(parsed.prefix);
          const wildcard = (~mask) >>> 0;
          const network = (parsed.ip & mask) >>> 0;
          const broadcast = (network | wildcard) >>> 0;
          const total = 2 ** (32 - parsed.prefix);
          const usable = parsed.prefix >= 31 ? total : Math.max(0, total - 2);
          return rows([
            ["网络地址", intToIPv4(network)],
            ["广播地址", intToIPv4(broadcast)],
            ["子网掩码", intToIPv4(mask)],
            ["通配符掩码", intToIPv4(wildcard)],
            ["前缀长度", "/" + parsed.prefix],
            ["地址总数", String(total)],
            ["可用主机数", String(usable)]
          ]);
        }
      },
      "ipv6-range-to-cidr": {
        group: "IPv6 工具",
        title: "IPv6 范围转 CIDR",
        kicker: "IPv6 Range to CIDR",
        desc: "把起止 IPv6 地址范围拆分为最少数量的 IPv6 CIDR 网段。",
        form: "输入起始和结束 IPv6 地址，支持 :: 压缩写法。",
        note: "IPv6 计算使用 BigInt 在浏览器本地完成。",
        sample: { start: "2001:db8::", end: "2001:db8::ff" },
        fields: [
          { id: "start", label: "起始 IPv6", type: "input", placeholder: "例如 2001:db8::" },
          { id: "end", label: "结束 IPv6", type: "input", placeholder: "例如 2001:db8::ff" }
        ],
        run: values => pre(ipv6RangeToCIDR(parseIPv6(values.start), parseIPv6(values.end)).join("\n"))
      },
      "ipv4-wildcard-mask": {
        group: "IPv4 工具",
        title: "IPv4 通配符掩码计算器",
        kicker: "IPv4 Wildcard Mask",
        desc: "在子网掩码、CIDR 前缀和 ACL 通配符掩码之间互相转换。",
        form: "输入 CIDR 或子网掩码。",
        note: "Cisco ACL 中的 wildcard mask 是子网掩码逐位取反，例如 /24 对应 0.0.0.255。",
        sample: { value: "192.168.10.0/24" },
        fields: [{ id: "value", label: "CIDR、前缀或子网掩码", type: "input", placeholder: "例如 192.168.10.0/24、/24 或 255.255.255.0" }],
        run: values => {
          const parsed = parseMaskInput(values.value);
          const mask = prefixMask(parsed.prefix);
          const wildcard = (~mask) >>> 0;
          const out = [["前缀长度", "/" + parsed.prefix], ["子网掩码", intToIPv4(mask)], ["通配符掩码", intToIPv4(wildcard)]];
          if (parsed.ip !== null) out.unshift(["网络地址", intToIPv4((parsed.ip & mask) >>> 0)]);
          return rows(out);
        }
      },
      "ipv4-subnet-calculator": {
        group: "CIDR / 子网工具",
        title: "IPv4 子网计算器",
        kicker: "IPv4 Subnet Calculator",
        desc: "根据 IPv4 地址和 CIDR 前缀计算网络地址、广播地址、主机范围、子网掩码和通配符掩码。",
        form: "输入一个 IPv4 CIDR，例如 192.168.10.34/27。",
        note: "如果输入的是主机地址，结果会自动归一化到所在子网。",
        sample: { cidr: "192.168.10.34/27" },
        fields: [{ id: "cidr", label: "IPv4 CIDR", type: "input", placeholder: "例如 192.168.10.34/27" }],
        run: values => {
          const parsed = parseIPv4CIDR(values.cidr);
          const mask = prefixMask(parsed.prefix);
          const wildcard = (~mask) >>> 0;
          const network = (parsed.ip & mask) >>> 0;
          const broadcast = (network | wildcard) >>> 0;
          const total = 2 ** (32 - parsed.prefix);
          const firstHost = parsed.prefix >= 31 ? network : network + 1;
          const lastHost = parsed.prefix >= 31 ? broadcast : broadcast - 1;
          const usable = parsed.prefix >= 31 ? total : Math.max(0, total - 2);
          return rows([
            ["输入地址", intToIPv4(parsed.ip)],
            ["CIDR", intToIPv4(network) + "/" + parsed.prefix],
            ["网络地址", intToIPv4(network)],
            ["广播地址", intToIPv4(broadcast)],
            ["第一个可用地址", intToIPv4(firstHost)],
            ["最后一个可用地址", intToIPv4(lastHost)],
            ["子网掩码", intToIPv4(mask)],
            ["通配符掩码", intToIPv4(wildcard)],
            ["地址总数", String(total)],
            ["可用主机数", String(usable)]
          ]);
        }
      },
      "ipv6-subnet-calculator": {
        group: "IPv6 工具",
        title: "IPv6 子网计算器",
        kicker: "IPv6 Subnet Calculator",
        desc: "根据 IPv6 地址和前缀长度计算网络地址、范围末尾地址、地址数量和可再划分子网数量。",
        form: "输入 IPv6 CIDR，并可选填写目标子网前缀。",
        note: "IPv6 没有广播地址；范围末尾地址只是该前缀内的最后一个地址。",
        sample: { cidr: "2001:db8:1234:5678::1/64", childPrefix: "80" },
        fields: [
          { id: "cidr", label: "IPv6 CIDR", type: "input", placeholder: "例如 2001:db8:1234:5678::1/64" },
          { id: "childPrefix", label: "目标子网前缀（可选）", type: "input", placeholder: "例如 80" }
        ],
        run: values => {
          const parsed = parseIPv6CIDR(values.cidr);
          const mask = ipv6PrefixMask(parsed.prefix);
          const network = parsed.ip & mask;
          const hostMask = ((1n << 128n) - 1n) ^ mask;
          const last = network | hostMask;
          const total = 1n << BigInt(128 - parsed.prefix);
          const out = [
            ["输入地址", formatIPv6(parsed.ip)],
            ["CIDR", formatIPv6(network) + "/" + parsed.prefix],

    function fieldHTML(field) {
      const id = validFieldId(field.id);
      const escapedId = escapeHTML(id);
      const attrs = [`id="${escapedId}"`, `placeholder="${escapeHTML(tr(field.placeholder || ""))}"`];
      if (field.min !== undefined) attrs.push(`min="${escapeHTML(field.min)}"`);
      if (field.max !== undefined) attrs.push(`max="${escapeHTML(field.max)}"`);
      const common = attrs.join(" ");
      let control = `<input type="${escapeHTML(field.type || "text")}" ${common} />`;
      if (field.type === "textarea") control = `<textarea ${common}></textarea>`;
      if (field.type === "select") control = `<select id="${escapedId}">${field.options.map(option => `<option value="${escapeHTML(option)}">${escapeHTML(tr(option))}</option>`).join("")}</select>`;
      return `<div class="field"><label for="${escapedId}">${escapeHTML(tr(field.label))}</label>${control}</div>`;
    }

    function values() {
      return Object.fromEntries(page.fields.map(f => [f.id, $(f.id).value.trim()]));

      return Object.fromEntries(page.fields.map(f => [f.id, $(f.id).value]));
    }

      for (const field of page.fields) if ($(field.id)) $(field.id).value = nextValues[field.id] || "";

      for (const field of page.fields) $(field.id).value = page.sample[field.id] || "";

    function ipv4ToInt(ip) {
      const parts = String(ip).trim().split(".");
      if (parts.length !== 4) throw new Error("IPv4 地址格式不正确");
      return parts.reduce((acc, part) => {
        if (!/^\d+$/.test(part)) throw new Error("IPv4 地址只能包含 0-255 的数字段");
        const n = Number(part);
        if (n < 0 || n > 255) throw new Error("IPv4 地址段必须在 0-255 之间");
        return ((acc << 8) | n) >>> 0;
      }, 0) >>> 0;
    }

    function intToIPv4(n) { return intToIPv4Parts(n).join("."); }
    function intToIPv4Parts(n) { return [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255]; }

    function prefixMask(prefix) {
      prefix = Number(prefix);
      if (!Number.isInteger(prefix) || prefix < 0 || prefix > 32) throw new Error("IPv4 前缀长度必须是 0-32");
      return prefix === 0 ? 0 : (0xFFFFFFFF << (32 - prefix)) >>> 0;
    }

    function parseIPv4Prefix(value) {
      const prefix = Number(String(value).trim().replace(/^\//, ""));
      if (!Number.isInteger(prefix) || prefix < 0 || prefix > 32) throw new Error("掩码位必须是 0-32");

    }

    function parseIPVersion(value) {
      const raw = String(value).trim().toLowerCase();
      if (raw === "4" || raw === "ipv4") return 4;
      if (raw === "6" || raw === "ipv6") return 6;
      throw new Error("IP 版本请输入 IPv4 或 IPv6");
    }

    function parsePrefixForVersion(value, maxBits) {
      const prefix = Number(String(value).trim().replace(/^\//, ""));
      if (!Number.isInteger(prefix) || prefix < 0 || prefix > maxBits) throw new Error("前缀长度必须是 0-" + maxBits);
      return prefix;
    }

    function parseIPv4CIDR(input) {
      const raw = String(input).trim();
      const match = raw.match(/^(?:(\d+\.\d+\.\d+\.\d+)\s*)?\/?(\d{1,2})$/) || raw.match(/^(\d+\.\d+\.\d+\.\d+)\/(\d{1,2})$/);
      if (!match) throw new Error("请输入类似 192.168.1.0/24 或 /24 的 CIDR");
      const ipText = match[1] || "0.0.0.0";
      const prefix = Number(match[2]);
      if (!Number.isInteger(prefix) || prefix < 0 || prefix > 32) throw new Error("IPv4 前缀长度必须是 0-32");
      return { ip: ipv4ToInt(ipText), prefix };
    }

    function parseMaskInput(input) {
      const raw = String(input).trim();
      if (raw.includes("/") || raw.startsWith("/")) return parseIPv4CIDR(raw);
      if (/^\d{1,2}$/.test(raw)) return { ip: null, prefix: Number(raw) };

      const inv = (~mask) >>> 0;
      if (((inv + 1) & inv) !== 0) throw new Error("子网掩码必须是连续的 1 后跟连续的 0");
      return { ip: null, prefix: mask === 0 ? 0 : 32 - Math.log2(inv + 1) };
    }

    function ipv4RangeToCIDR(start, end) {
      if (start > end) throw new Error("起始地址不能大于结束地址");
      const result = [];
      let current = start >>> 0;
      while (current <= end) {
        const remaining = end - current + 1;
        const maxByAlign = current === 0 ? 2 ** 32 : (current & -current) >>> 0;
        let block = Math.min(maxByAlign || 2 ** 32, 2 ** Math.floor(Math.log2(remaining)));
        const prefix = 32 - Math.log2(block);
        result.push(intToIPv4(current) + "/" + prefix);
        current += block;
        if (current > 0xFFFFFFFF) break;
      }
      return result;
    }

    function parseCIDR(cidr) {
      const parsed = parseIPv4CIDR(cidr);
      const mask = prefixMask(parsed.prefix);
      const start = (parsed.ip & mask) >>> 0;
      const end = (start | ((~mask) >>> 0)) >>> 0;
      return { start, end, prefix: parsed.prefix };
    }

    function ipv4RangeRows(range) {
      const total = range.end - range.start + 1;
      const usable = range.prefix >= 31 ? total : Math.max(0, total - 2);
      const first = range.prefix >= 31 ? range.start : range.start + 1;
      const last = range.prefix >= 31 ? range.end : range.end - 1;
      return rows([
        ["CIDR", intToIPv4(range.start) + "/" + range.prefix],
        ["网络地址", intToIPv4(range.start)],
        ["广播地址", intToIPv4(range.end)],
        ["第一可用", intToIPv4(first)],
        ["最后可用", intToIPv4(last)],
        ["地址总数", String(total)],
        ["可用主机数", String(usable)]
      ]);
    }

    function aggregateCIDRs(text) {
      let ranges = String(text).split(/\r?\n/).map(x => x.trim()).filter(Boolean).map(parseCIDR).sort((a, b) => a.start - b.start || a.end - b.end);
      if (!ranges.length) throw new Error("请输入至少一个 CIDR");
      const merged = [];
      for (const range of ranges) {
        const last = merged[merged.length - 1];
        if (last && range.start <= last.end + 1) last.end = Math.max(last.end, range.end);
        else merged.push({ ...range });
      }
      return merged.flatMap(range => ipv4RangeToCIDR(range.start, range.end));
    }

    function parseIPv6(input) {
      let text = String(input).trim().toLowerCase();
      if (!text) throw new Error("IPv6 地址不能为空");
      if (text.includes(".")) {
        const lastColon = text.lastIndexOf(":");
        const v4 = ipv4ToInt(text.slice(lastColon + 1));
        text = text.slice(0, lastColon) + ":" + ((v4 >>> 16) & 0xffff).toString(16) + ":" + (v4 & 0xffff).toString(16);
      }
      const sides = text.split("::");
      if (sides.length > 2) throw new Error("IPv6 地址格式不正确");
      const left = sides[0] ? sides[0].split(":") : [];
      const right = sides[1] ? sides[1].split(":") : [];
      const fill = sides.length === 2 ? new Array(8 - left.length - right.length).fill("0") : [];
      const parts = [...left, ...fill, ...right];
      if (parts.length !== 8) throw new Error("IPv6 地址必须包含 8 个 16 位分组");
      return parts.reduce((acc, part) => {
        if (!/^[0-9a-f]{1,4}$/.test(part)) throw new Error("IPv6 分组格式不正确");
        return (acc << 16n) + BigInt(parseInt(part, 16));
      }, 0n);
    }

    function parseIPv6CIDR(input) {
      const parts = String(input).trim().split("/");
      if (parts.length !== 2) throw new Error("请输入类似 2001:db8::1/64 的 IPv6 CIDR");
      const prefix = Number(parts[1]);
      if (!Number.isInteger(prefix) || prefix < 0 || prefix > 128) throw new Error("IPv6 前缀长度必须是 0-128");
      return { ip: parseIPv6(parts[0]), prefix };
    }

    function ipv6CIDRRange(parsed) {
      const mask = ipv6PrefixMask(parsed.prefix);
      const start = parsed.ip & mask;
      const end = start | (((1n << 128n) - 1n) ^ mask);
      return { start, end, total: 1n << BigInt(128 - parsed.prefix) };
    }

    function ipv6PrefixMask(prefix) {
      if (prefix === 0) return 0n;
      return (((1n << 128n) - 1n) << BigInt(128 - prefix)) & ((1n << 128n) - 1n);
    }

    function formatBigInt(value) {
      return value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function formatIPv6(value) {
      const parts = ipv6Parts(value);
      let bestStart = -1, bestLen = 0;
      for (let i = 0; i < 8; ) {
        if (parts[i] !== "0") { i++; continue; }
        let j = i;
        while (j < 8 && parts[j] === "0") j++;
        if (j - i > bestLen) { bestStart = i; bestLen = j - i; }
        i = j;
      }
      if (bestLen < 2) return parts.join(":");
      const before = parts.slice(0, bestStart).join(":");
      const after = parts.slice(bestStart + bestLen).join(":");
      return before + "::" + after || "::";
    }

    function ipv6Parts(value) {
      const parts = [];
      for (let i = 7; i >= 0; i--) parts.push(Number((value >> BigInt(i * 16)) & 0xffffn).toString(16));
      return parts;
    }

    function ipv6RangeToCIDR(start, end) {
      if (start > end) throw new Error("起始地址不能大于结束地址");
      const result = [];
      let current = start;
      while (current <= end) {
        const remaining = end - current + 1n;
        const align = current === 0n ? (1n << 128n) : current & -current;
        let block = align;
        while (block > remaining) block >>= 1n;
        const prefix = 128 - bitLength(block - 1n);
        result.push(formatIPv6(current) + "/" + prefix);
        current += block;
      }
      return result;
    }

    function bitLength(n) {
      let len = 0;
      while (n > 0n) { n >>= 1n; len++; }
      return len;
    }

    function makeNat64(prefixText, ipv4Text) {
      const prefix = String(prefixText).trim().split("/");
      const len = Number(prefix[1] || 96);
      if (len !== 96) throw new Error("当前页面支持最常见的 /96 NAT64 前缀");
      const base = parseIPv6(prefix[0] || "64:ff9b::");
      return formatIPv6((base & (((1n << 128n) - 1n) ^ ((1n << 32n) - 1n))) + BigInt(ipv4ToInt(ipv4Text)));
    }

    function extractNat64IPv4(ipv6Text) {
      const value = parseIPv6(ipv6Text);
      return intToIPv4(Number(value & 0xffffffffn));
    }

    function validateIPRows(input) {
      try {
        const n = ipv4ToInt(input);
        return [["是否合法", "是"], ["IP 版本", "IPv4"], ["规范化地址", intToIPv4(n)], ["地址类型", ipAddressTypeRows(input).map(x => x[1]).join(currentLang === "zh" ? "；" : "; ")]];
      } catch (v4Err) {
        try {
          const n = parseIPv6(input);
          return [["是否合法", "是"], ["IP 版本", "IPv6"], ["压缩格式", formatIPv6(n)], ["展开格式", ipv6Parts(n).map(x => x.padStart(4, "0")).join(":")], ["地址类型", ipAddressTypeRows(input).map(x => x[1]).join(currentLang === "zh" ? "；" : "; ")]];
        } catch (v6Err) {
          return [["是否合法", "否"], ["错误原因", tr(v4Err.message) + (currentLang === "zh" ? "；" : "; ") + tr(v6Err.message)]];
        }
      }
    }

    function ipAddressTypeRows(input) {
      try {
        const ip = ipv4ToInt(input);
        const types = [];
        if (inIPv4CIDR(ip, "10.0.0.0", 8) || inIPv4CIDR(ip, "172.16.0.0", 12) || inIPv4CIDR(ip, "192.168.0.0", 16)) types.push("私网地址");
        if (inIPv4CIDR(ip, "100.64.0.0", 10)) types.push("CGNAT 地址");
        if (inIPv4CIDR(ip, "127.0.0.0", 8)) types.push("回环地址");
        if (inIPv4CIDR(ip, "169.254.0.0", 16)) types.push("链路本地地址");
        if (inIPv4CIDR(ip, "224.0.0.0", 4)) types.push("多播地址");
        if (inIPv4CIDR(ip, "0.0.0.0", 8) || inIPv4CIDR(ip, "240.0.0.0", 4) || ip === 0xffffffff) types.push("保留地址");
        if (inIPv4CIDR(ip, "192.0.2.0", 24) || inIPv4CIDR(ip, "198.51.100.0", 24) || inIPv4CIDR(ip, "203.0.113.0", 24)) types.push("文档示例地址");
        if (!types.length) types.push("公网单播地址");
        return [["IP 版本", "IPv4"], ["规范化地址", intToIPv4(ip)], ["类型", types.join(currentLang === "zh" ? "；" : "; ")], ["是否通常可公网路由", types[0] === "公网单播地址" ? "是" : "否"]];
      } catch (_) {
        const ip = parseIPv6(input);
        const types = [];
        if (ip === 1n) types.push("回环地址");
        if ((ip >> 120n) === 0xffn) types.push("多播地址");
        if ((ip >> 121n) === 0x7en) types.push("唯一本地地址 ULA");
        if ((ip >> 118n) === 0x3fan) types.push("链路本地地址");
        if ((ip >> 96n) === 0x20010db8n) types.push("文档示例地址");
        if (ip === 0n) types.push("未指定地址");
        if (!types.length) types.push("公网单播地址或特殊全局地址");
        return [["IP 版本", "IPv6"], ["压缩格式", formatIPv6(ip)], ["类型", types.join(currentLang === "zh" ? "；" : "; ")], ["是否通常可公网路由", types[0].startsWith("公网") ? "是" : "否"]];
      }
    }

    function inIPv4CIDR(ip, network, prefix) {
      const mask = prefixMask(prefix);
      return (ip & mask) === (ipv4ToInt(network) & mask);
    }

    function reverseDNSRows(input) {
      try {
        const parts = intToIPv4Parts(ipv4ToInt(input));
        return [["IP 版本", "IPv4"], ["反向 DNS", parts.reverse().join(".") + ".in-addr.arpa"]];
      } catch (_) {
        const expanded = ipv6Parts(parseIPv6(input)).map(x => x.padStart(4, "0")).join("");
        return [["IP 版本", "IPv6"], ["反向 DNS", expanded.split("").reverse().join(".") + ".ip6.arpa"]];
      }
    }

    function splitSubnet(cidr, childPrefixText) {
      const childPrefix = Number(String(childPrefixText).trim().replace(/^\//, ""));
      if (String(cidr).includes(":")) {
        const parsed = parseIPv6CIDR(cidr);
        if (!Number.isInteger(childPrefix) || childPrefix < parsed.prefix || childPrefix > 128) throw new Error("目标 IPv6 前缀必须在父级前缀到 128 之间");
        const range = ipv6CIDRRange(parsed);
        const step = 1n << BigInt(128 - childPrefix);
        const count = 1n << BigInt(childPrefix - parsed.prefix);
        const limit = count > 256n ? 256n : count;
        const out = [];
        for (let i = 0n; i < limit; i++) out.push(formatIPv6(range.start + i * step) + "/" + childPrefix);
        if (count > 256n) out.push("... 共 " + formatBigInt(count) + " 个子网，仅显示前 256 个");
        return out;
      }
      const parsed = parseCIDR(cidr);
      if (!Number.isInteger(childPrefix) || childPrefix < parsed.prefix || childPrefix > 32) throw new Error("目标 IPv4 前缀必须在父级前缀到 32 之间");
      const step = 2 ** (32 - childPrefix);
      const count = 2 ** (childPrefix - parsed.prefix);
      const limit = Math.min(count, 256);
      const out = [];
      for (let i = 0; i < limit; i++) out.push(intToIPv4(parsed.start + i * step) + "/" + childPrefix);
      if (count > 256) out.push("... 共 " + count + " 个子网，仅显示前 256 个");
      return out;
    }

    function bulkIPv4(text) {
      const lines = String(text).split(/\r?\n/).map(x => x.trim()).filter(Boolean);
      if (!lines.length) throw new Error("请输入至少一个 IPv4 CIDR");
      return lines.map(line => {
        const range = parseCIDR(line);
        const total = range.end - range.start + 1;
        const first = range.prefix >= 31 ? range.start : range.start + 1;
        const last = range.prefix >= 31 ? range.end : range.end - 1;
        return `${line}\n  网络: ${intToIPv4(range.start)}\n  广播: ${intToIPv4(range.end)}\n  第一可用: ${intToIPv4(first)}\n  最后可用: ${intToIPv4(last)}\n  地址总数: ${total}`;
      }).join("\n\n");
    }

    init();
  </script>
</body>
