<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP 查询 - NetScope 网络视镜</title>
  <style>
    :root {
      color-scheme: light;
      --bg-a: #eef3ff;
      --bg-b: #f7fbff;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-strong: #ffffff;
      --text: #101522;
      --muted: #5f6b86;
      --line: rgba(30, 41, 59, 0.12);
      --accent: #247cff;
      --accent-strong: #1362dc;
      --ok: #1d8a49;
      --danger: #cf2f3f;
      --shadow: 0 12px 36px rgba(31, 57, 112, 0.12);
      --radius-lg: 22px;
      --radius-md: 14px;
      --font: "SF Pro Text", "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg-a: #0d1322;
      --bg-b: #141c30;
      --surface: rgba(16, 24, 40, 0.72);
      --surface-strong: #101a2d;
      --text: #eaf0ff;
      --muted: #9aa8c8;
      --line: rgba(176, 194, 232, 0.18);
      --accent: #69a4ff;
      --accent-strong: #4f8ef3;
      --ok: #5ad78a;
      --danger: #ff7d87;
      --shadow: 0 18px 48px rgba(3, 8, 19, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(920px 420px at -2% -6%, rgba(135, 184, 255, 0.2), transparent 62%),
        radial-gradient(760px 460px at 102% -12%, rgba(157, 206, 255, 0.16), transparent 58%),
        linear-gradient(165deg, var(--bg-a), var(--bg-b));
      transition: background 240ms ease, color 240ms ease;
    }

    .wrap {
      width: min(1160px, calc(100% - 28px));
      margin: 18px auto 28px;
    }

    .topbar {
      position: sticky;
      top: 14px;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .topbar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-left: 6px;
    }

    .logo {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: linear-gradient(145deg, #70adff, #1f78ff);
      box-shadow: 0 6px 16px rgba(36, 124, 255, 0.36);
    }

    .brand h1 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.2px;
      font-weight: 620;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .menu-toggle {
      display: none;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--surface-strong);
      color: var(--text);
      padding: 9px 13px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 550;
      transition: all 180ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(36, 124, 255, 0.36);
    }

    .btn.primary {
      background: linear-gradient(145deg, var(--accent), var(--accent-strong));
      border-color: transparent;
      color: #fff;
      box-shadow: 0 10px 22px rgba(29, 104, 223, 0.28);
    }

    .btn.link {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .hero,
    .card {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .hero { padding: 22px; }

    .hero h2 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0.2px;
      line-height: 1.2;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      max-width: 860px;
      line-height: 1.65;
    }

    .card { padding: 18px; }

    .card h3 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .input-row {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-strong);
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    .input:focus {
      border-color: rgba(34, 120, 255, 0.45);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.16);
    }

    .muted {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-left: 8px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 620;
      color: #fff;
      background: #6b7280;
    }

    .badge.residential { background: #2d8a34; }
    .badge.mobile { background: #3769ff; }
    .badge.datacenter { background: #d46b08; }
    .badge.business { background: #0066cc; }
    .badge.hosting { background: #b35c00; }
    .badge.unknown { background: #6b7280; }

    .ok { color: var(--ok); font-weight: 620; }
    .danger { color: var(--danger); font-weight: 620; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    td {
      border-bottom: 1px solid var(--line);
      padding: 9px 7px;
      vertical-align: top;
    }

    tr:last-child td { border-bottom: none; }

    td:first-child {
      width: 224px;
      color: var(--muted);
      font-weight: 540;
    }

    @media (max-width: 980px) {
      .wrap { width: min(1160px, calc(100% - 18px)); }
      .topbar {
        top: 8px;
        flex-direction: column;
        align-items: stretch;
        border-radius: 18px;
      }
      .topbar-head { width: 100%; }
      .brand {
        justify-content: flex-start;
        padding-left: 0;
      }
      .menu-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .toolbar {
        display: none;
        width: 100%;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        justify-content: stretch;
      }
      .toolbar.is-open {
        display: grid;
      }
      .hero h2 { font-size: 22px; }
      .input-row { grid-template-columns: 1fr; }
      .toolbar .btn { width: 100%; justify-content: center; }
    }

    @media (max-width: 760px) {
      td,
      tr,
      table,
      tbody { display: block; }
      tr {
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
      }
      tr:last-child { border-bottom: none; }
      td {
        border-bottom: none;
        width: 100%;
        padding: 4px 0;
      }
      td:first-child {
        width: 100%;
        margin-bottom: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="topbar-head">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <h1 data-i18n="appTitle">NetScope 网络视镜</h1>
        </div>
        <button id="menuToggleBtn" class="btn menu-toggle" type="button" data-i18n="mobileMenu" aria-expanded="false">Menu</button>
      </div>
      <div class="toolbar" id="toolbar">
        <a href="/" class="btn link" data-i18n="goMy">NetScope</a>
        <a href="/ip-look" class="btn link" data-i18n="goSearch">IP Search</a>
        <a href="/nat-test" class="btn link" data-i18n="natTest">NAT Test</a>
        <a href="/screen-test" class="btn link" data-i18n="screenTest">Screen Test</a>
        <a href="/bandwidth-calculator" class="btn link" data-i18n="bandwidthCalculator">Bandwidth Calculator</a>
        <a href="/tools" class="btn link" data-i18n="ipTools">IP Tools</a>
        <button id="langBtn" class="btn">EN</button>
        <button id="themeBtn" class="btn" data-i18n="themeAuto">Theme: Auto</button>
      </div>
    </div>

    <section class="hero">
      <h2 data-i18n="heroTitle">IP Lookup</h2>
      <p data-i18n="heroDesc">Open this page to query your current public IP automatically, or enter another IP/domain.</p>
    </section>

    <section class="card">
      <div class="input-row">
        <input id="queryInput" class="input" placeholder="8.8.8.8 / google.com" />
        <button id="queryBtn" class="btn primary" data-i18n="queryBtn">Query IP</button>
      </div>
      <p class="muted" id="hint" data-i18n="hint">Default query uses your current connection IP.</p>
    </section>

    <section class="card">
      <h3 data-i18n="ipResultTitle">IP Query Result</h3>
      <div id="ipResult">-</div>
    </section>
  </div>

  <script src="/assets/js/i18n.js"></script>
  <script src="/assets/js/ui-common.js"></script>
  <script src="/assets/js/mobile-nav.js"></script>
  <script>
    const I18N = {
      zh: {
        pageTitle: "IP 查询 - NetScope 网络视镜",
        appTitle: "NetScope 网络视镜",
        goMy: "NetScope",
        goSearch: "IP 搜索",
        natTest: "NAT 检测",
        screenTest: "屏幕检测",
        bandwidthCalculator: "带宽计算器",
        ipTools: "IP 工具",
        mobileMenu: "菜单",
        heroTitle: "IP 查询",
        heroDesc: "打开页面自动查询当前本地访问地址，也可以输入其他 IP 或域名查询。",
        queryBtn: "查询 IP",
        hint: "默认查询当前连接 IP。",
        ipResultTitle: "IP 查询结果",
        loadingLocal: "正在获取当前地址...",
        querying: "查询中...",
        queryFailed: "查询失败",
        yes: "是",
        no: "否",
        unknown: "未知",
        themeAuto: "主题：自动",
        themeLight: "主题：浅色",
        themeDark: "主题：深色",
        fields: window.APP_I18N.index.zh.fields
      },
      en: {
        pageTitle: "IP Lookup - NetScope",
        appTitle: "NetScope",
        goMy: "NetScope",
        goSearch: "IP Search",
        natTest: "NAT Test",
        screenTest: "Screen Test",
        bandwidthCalculator: "Bandwidth Calculator",
        ipTools: "IP Tools",
        mobileMenu: "Menu",
        heroTitle: "IP Lookup",
        heroDesc: "Open this page to query your current public IP automatically, or enter another IP/domain.",
        queryBtn: "Query IP",
        hint: "Default query uses your current connection IP.",
        ipResultTitle: "IP Query Result",
        loadingLocal: "Getting current address...",
        querying: "Querying...",
        queryFailed: "Query failed",
        yes: "Yes",
        no: "No",
        unknown: "Unknown",
        themeAuto: "Theme: Auto",
        themeLight: "Theme: Light",
        themeDark: "Theme: Dark",
        fields: window.APP_I18N.index.en.fields
      }
    };

    const ui = window.UICommon.createUIContext({
      i18n: I18N,
      onApplyI18n: (lang) => {
        document.getElementById("queryInput").placeholder =
          lang === "zh" ? "输入 IPv4 / IPv6 / 域名，例如 8.8.8.8" : "Enter IPv4 / IPv6 / domain, e.g. 8.8.8.8";
      }
    });

    function escapeHtml(str) {
      if (str === null || str === undefined) return "";
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function t(key) { return ui.t(key); }
    function f(key) { return ui.f(key); }

    function tableRow(label, value) {
      return `<tr><td>${escapeHtml(label)}</td><td>${value}</td></tr>`;
    }

    function yesNo(v) {
      return v ? `<span class="danger">${t("yes")}</span>` : `<span class="ok">${t("no")}</span>`;
    }

    function translateValue(value, map) {
      if (value === null || value === undefined) return "";
      const raw = String(value).trim();
      if (!raw) return "";
      if (ui.getLang() !== "zh") return raw;
      return map[raw.toLowerCase()] || raw;
    }

    function localizedQueryType(value) {
      return translateValue(value, { ip: "IP", domain: "域名" });
    }

    function renderIPResult(data) {
      const badgeCode = data.ip_type && data.ip_type.code ? data.ip_type.code : "unknown";
      const badgeLabel = data.ip_type && data.ip_type.label ? data.ip_type.label : t("unknown");
      const rows = [
        tableRow(f("address"), `${escapeHtml(data.address && data.address.ip ? data.address.ip : "")} <span class="badge ${escapeHtml(badgeCode)}">${escapeHtml(badgeLabel)}</span>`),
        tableRow(f("query"), escapeHtml(data.address && data.address.query ? data.address.query : "")),
        tableRow(f("queryType"), escapeHtml(localizedQueryType(data.address && data.address.query_type ? data.address.query_type : ""))),
        tableRow(f("ipVersion"), escapeHtml(data.address && data.address.ip_version ? data.address.ip_version : "")),
        tableRow(f("hostname"), escapeHtml(data.address && data.address.hostname ? data.address.hostname : "")),
        tableRow(f("ipv4List"), (data.address && data.address.ipv4_list ? data.address.ipv4_list : []).map(escapeHtml).join("<br>") || "-"),
        tableRow(f("ipv6List"), (data.address && data.address.ipv6_list ? data.address.ipv6_list : []).map(escapeHtml).join("<br>") || "-"),
        tableRow(f("isp"), escapeHtml(data.network && data.network.isp ? data.network.isp : "")),
        tableRow(f("ipOrganization"), escapeHtml(data.network && data.network.ip_organization ? data.network.ip_organization : "")),
        tableRow(f("asn"), escapeHtml(data.network && data.network.asn ? data.network.asn : "")),
        tableRow(f("asnNumber"), escapeHtml(data.network && data.network.asn_number ? data.network.asn_number : "")),
        tableRow(f("asnOrganization"), escapeHtml(data.network && data.network.asn_organization ? data.network.asn_organization : "")),
        tableRow(f("network"), escapeHtml(data.network && data.network.network ? data.network.network : "") || "-"),
        tableRow(f("location"), escapeHtml(data.location && data.location.formatted ? data.location.formatted : "")),
        tableRow(f("country"), `${escapeHtml(data.location && data.location.country ? data.location.country : "")} (${escapeHtml(data.location && data.location.country_code ? data.location.country_code : "")})`),
        tableRow(f("regionCity"), `${escapeHtml(data.location && data.location.region ? data.location.region : "")} / ${escapeHtml(data.location && data.location.city ? data.location.city : "")}`),
        tableRow(f("postalCode"), escapeHtml(data.location && data.location.postal_code ? data.location.postal_code : "")),
        tableRow(f("timezone"), escapeHtml(data.location && data.location.timezone ? data.location.timezone : "")),
        tableRow(f("latLng"), `${escapeHtml(data.location && data.location.latitude ? data.location.latitude : "")} / ${escapeHtml(data.location && data.location.longitude ? data.location.longitude : "")}`),
        tableRow(f("proxy"), yesNo(data.security && data.security.is_proxy)),
        tableRow(f("vpn"), yesNo(data.security && data.security.is_vpn)),
        tableRow(f("tor"), yesNo(data.security && data.security.is_tor)),
        tableRow(f("datacenter"), yesNo(data.security && data.security.is_datacenter)),
        tableRow(f("hosting"), yesNo(data.security && data.security.is_hosting)),
        tableRow(f("mobile"), yesNo(data.security && data.security.is_mobile)),
        tableRow(f("geoSource"), escapeHtml(data.source && data.source.geo_source ? data.source.geo_source : "")),
        tableRow(f("asnSource"), escapeHtml(data.source && data.source.asn_source ? data.source.asn_source : "")),
        tableRow(f("securitySource"), escapeHtml(data.source && data.source.security_source ? data.source.security_source : "")),
        tableRow(f("ispSource"), escapeHtml(data.source && data.source.isp_source ? data.source.isp_source : ""))
      ];
      document.getElementById("ipResult").innerHTML = `<table>${rows.join("")}</table>`;
    }

    async function queryIP(query) {
      const q = (query || document.getElementById("queryInput").value).trim();
      if (!q) return;
      document.getElementById("queryInput").value = q;
      document.getElementById("ipResult").textContent = t("querying");
      const resp = await fetch("/api/ip?q=" + encodeURIComponent(q) + "&lang=" + ui.getLang());
      const data = await resp.json();
      if (!resp.ok) {
        document.getElementById("ipResult").innerHTML = `<span class="danger">${escapeHtml(data.error || t("queryFailed"))}</span>`;
        return;
      }
      renderIPResult(data);
    }

    async function queryLocalIP() {
      document.getElementById("ipResult").textContent = t("loadingLocal");
      const resp = await fetch("/api/myip");
      const data = await resp.json();
      if (!resp.ok || !data.ip) {
        document.getElementById("ipResult").innerHTML = `<span class="danger">${escapeHtml(data.error || t("queryFailed"))}</span>`;
        return;
      }
      await queryIP(data.ip);
    }

    function rerenderWithLanguage() {
      const current = document.getElementById("queryInput").value.trim();
      if (current) queryIP(current);
    }

    document.getElementById("queryBtn").addEventListener("click", () => queryIP());
    document.getElementById("queryInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") queryIP();
    });

    ui.bindControls({ onLanguageChanged: rerenderWithLanguage });
    ui.applyI18n();
    if (window.AppMobileNav && window.AppMobileNav.init) {
      window.AppMobileNav.init({
        toggleId: "menuToggleBtn",
        menuId: "toolbar",
        mediaQuery: "(max-width: 980px)",
        openClass: "is-open",
        linkSelector: "a.btn"
      });
    }
    queryLocalIP();
  </script>
</body>
</html>
